name: Update DuPage County Board roster

# Weekly refresh of the DuPage County Board District card's member roster
# (data/app/dupage-county-board-members.json, fetched by index.html). Re-scrapes
# dupagecounty.gov's member directory + per-member detail pages (names, published
# @dupagecounty.gov emails, profile links; the countywide Board Chair) and, if
# anything changed, opens a PR rather than committing directly to main —
# officeholder data should get a human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 0" # Sunday 13:00 UTC (staggered from Mon ILGA/congress, Tue CPD, Wed CCPSA, Thu Will, Fri CCBR, Sat county-clerk)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        # Version-pinned via scripts/requirements.txt (constraints); only the two
        # packages this job needs — dupagecounty.gov's directory is static,
        # server-rendered HTML (no JS/Cloudflare challenge), so no Playwright.
        run: pip install -c scripts/requirements.txt requests beautifulsoup4

      - name: Scrape DuPage County Board member roster
        run: python3 scripts/dupage_county_board_scraper.py /tmp/dupage_county_board_raw.json

      - name: Rebuild roster data file
        run: python3 scripts/build_dupage_county_board_roster.py /tmp/dupage_county_board_raw.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present and
      # well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/dupage-county-board-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/dupage-county-board-members.json
          git commit -m "Update DuPage County Board roster from dupagecounty.gov"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update DuPage County Board roster from dupagecounty.gov" \
              --body "Automated weekly refresh of the DuPage County Board District card's member roster (names, published emails, profile links, and the countywide Chair), generated by \`scripts/dupage_county_board_scraper.py\` + \`scripts/build_dupage_county_board_roster.py\` from dupagecounty.gov. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
