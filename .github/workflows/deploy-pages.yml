name: Deploy to GitHub Pages

# Publishes only the files the app actually serves — index.html, sw.js,
# manifest.webmanifest, CNAME, .nojekyll, icons/, and data/app/*.json — instead
# of the whole branch. The classic "Deploy from a branch" flow shipped the entire
# tree to the CDN: the scrapers/builders (scripts/), the docs (docs/), and ~5 MB
# of build-only geometry (data/source/ raw zips+xlsx and the three full-precision
# data/*.geojson originals that data/app/*.json is simplified from). None of that
# is fetched at runtime, so this assembles a curated site directory and uploads
# that as the Pages artifact.
#
# ONE-TIME OWNER SETUP REQUIRED: this workflow only takes effect once the repo's
# Pages *source* is switched from "Deploy from a branch" to "GitHub Actions"
# (Settings -> Pages -> Build and deployment -> Source). Until then the classic
# branch deploy keeps serving the live site and this job's final deploy step will
# fail (harmless — no outage, the classic deploy is still authoritative). After
# the flip, this becomes the deploy path and the custom domain (CNAME) is
# preserved by shipping the CNAME file in the artifact.
#
# The exclude list below is the ONLY thing standing between "app files" and "app
# files + 5 MB of build inputs". Keep data/app in and data/source + data/*.geojson
# out when either moves.
#
# ENGINE ASSEMBLY (docs/MECHANIZATION_PLAYBOOK.md, Conversion 1): before the
# site is assembled, the fenced ENGINE blocks in index.html and sw.js are
# replaced from the engine release pinned in engine.lock.json — download,
# sha256-verify against the lockfile, splice (scripts/apply_engine.py), then
# re-run the merge gate and the behaviour gate on the assembled tree. Parity
# with the sibling forks is true by construction: every fork deploys the same
# hash-pinned bytes instead of trusting hand-ported diffs.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege token set the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress deploy finish rather than
# cancelling it mid-publish (which could leave the site half-updated).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # TODO(bootstrap): delete the HTTP-404 skip branch below (and the
      # `present` output plumbing) once the engine-v1.0.0 release is
      # published. It exists only so deploys keep working in the window
      # between merging this workflow and pushing the first engine-v* tag;
      # after that window, a missing pinned release must FAIL the deploy,
      # not skip assembly.
      - name: Fetch pinned engine release
        id: engine
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="$(jq -r .engine_version engine.lock.json)"
          # The releases/tags endpoint lists PUBLISHED releases only (drafts
          # 404). Skip assembly ONLY on an explicit 404 — the release truly
          # doesn't exist yet (bootstrap window). Any other failure (rate
          # limit, 5xx, auth, network) fails the deploy: a transient API
          # error must never silently skip hash verification and ship
          # unverified bytes on a green job.
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$ver" --silent 2>"$RUNNER_TEMP/gh-release-err.txt"; then
            gh release download "$ver" --repo "$GITHUB_REPOSITORY" \
              --pattern 'engine.bundle.js' --pattern 'engine.manifest.json' --clobber
            echo "present=true" >> "$GITHUB_OUTPUT"
          elif grep -q "HTTP 404" "$RUNNER_TEMP/gh-release-err.txt"; then
            echo "::warning title=Engine release not published — assembly SKIPPED::engine.lock.json pins $ver but no such release is published yet. Deploying the committed tree WITHOUT hash-verified engine assembly (bootstrap window only — see docs/MECHANIZATION_PLAYBOOK.md, Conversion 1). Publish the $ver release to close this gap."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            cat "$RUNNER_TEMP/gh-release-err.txt"
            echo "::error::could not determine whether engine release $ver is published — refusing to deploy without hash-verified engine assembly (re-run the workflow)"
            exit 1
          fi

      # The TWO spaces between hash and filename are load-bearing — a single
      # space (or CRLF) breaks `sha256sum --check` parsing.
      - name: Verify engine hash, apply, re-run static merge gate
        if: steps.engine.outputs.present == 'true'
        run: |
          echo "$(jq -r .sha256 engine.lock.json)  engine.bundle.js" | sha256sum --check -
          python3 scripts/apply_engine.py
          python3 scripts/validate_index.py index.html

      - uses: actions/setup-node@v4
        if: steps.engine.outputs.present == 'true'
        with:
          node-version: "20"

      # Same pinned toolchain as smoke-test.yml. The behaviour gate re-runs
      # here because the assembled tree (committed files + spliced engine) is
      # what actually ships — smoke-test.yml only covered the committed tree.
      - name: Install Playwright + Chromium
        if: steps.engine.outputs.present == 'true'
        run: |
          npm install playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Behaviour gate on the assembled tree (serve + smoke test)
        if: steps.engine.outputs.present == 'true'
        env:
          BASE_URL: http://localhost:8000/
        run: |
          python3 -m http.server 8000 &
          server_pid=$!
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/ >/dev/null && break
            sleep 0.5
          done
          node scripts/smoke_test.mjs
          status=$?
          kill "$server_pid" 2>/dev/null || true
          exit $status

      - name: Assemble site (app files only — drop scripts/docs/raw data)
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='scripts' \
            --exclude='docs' \
            --exclude='data/source' \
            --exclude='icons/source' \
            --exclude='data/*.geojson' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='engine.lock.json' \
            --exclude='engine.bundle.js' \
            --exclude='engine.manifest.json' \
            --exclude='CLAUDE.md' \
            ./ _site/
          echo "Published tree:" && find _site -type f | sort

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
