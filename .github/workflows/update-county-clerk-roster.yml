name: Update Illinois county clerk roster

# Weekly refresh of the County card's clerk roster
# (data/app/il-county-clerks.json, fetched by index.html). Re-scrapes the
# State Board of Elections' election-authority directory and, if anything
# changed, opens a PR rather than committing directly to main — officeholder
# data should get a human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 6" # Saturday 13:00 UTC (staggered from the Mon-Fri roster jobs)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        # Version-pinned via scripts/requirements.txt (constraints), but only the
        # two packages this job needs — elections.il.gov is a plain ASP.NET form
        # with no JS challenge, so no Playwright (that's CPD-only).
        run: pip install -c scripts/requirements.txt requests beautifulsoup4

      - name: Scrape the ISBE election-authority directory
        run: python3 scripts/il_county_clerk_scraper.py --out /tmp/il_county_clerks.json

      - name: Rebuild roster data file
        run: python3 scripts/build_county_clerk_roster.py /tmp/il_county_clerks.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/county-clerk-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/il-county-clerks.json
          git commit -m "Update Illinois county clerk roster from the ISBE directory"
          git push -u origin "$branch" --force
          # Only open a PR if one isn't already open for this branch; if it is,
          # the force-push above already updated it.
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update Illinois county clerk roster from the ISBE directory" \
              --body "Automated weekly refresh of the County card's clerk roster, generated by \`scripts/il_county_clerk_scraper.py\` + \`scripts/build_county_clerk_roster.py\` from the State Board of Elections' election-authority directory. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
