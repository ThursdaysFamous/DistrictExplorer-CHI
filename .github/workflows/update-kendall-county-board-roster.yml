name: Update Kendall County Board roster

# Weekly refresh of the consolidated county-board layer's Kendall member
# roster (data/app/kendall-county-board-members.json, fetched by index.html).
# Re-scrapes kendallcountyil.gov's board-members listing + per-member pages
# (names, districts, the Chairman role, phones, emails) and, if anything
# changed, opens a PR rather than committing directly to main — officeholder
# data should get a human look before it ships.

on:
  schedule:
    - cron: "0 14 * * 4" # Thursday 14:00 UTC (an hour after the Will board run — county-board day)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: pip install -r scripts/requirements.txt

      # kendallcountyil.gov's Akamai front denies datacenter clients — the
      # sibling McHenry run proved even a genuine headless Chromium never
      # clears this block class. The scraper's --engine auto ladder is
      # requests -> playwright -> wayback (Internet Archive Save Page Now);
      # Chromium stays installed for the middle rung in case the edge policy
      # ever relaxes.
      - name: Install Chromium for Playwright
        run: python3 -m playwright install --with-deps chromium

      - name: Scrape Kendall County Board member roster
        id: scrape
        # A total fetch failure is an EXPECTED state for this source (the county
        # blocks direct clients, real browsers, and the Internet Archive's
        # crawler alike — verified 2026-07-23 via SPN2 error:no-request), so it
        # feeds a standing tracking issue instead of a red run — the
        # validate-sources pattern. The roster file keeps its last
        # hand-verified state; any rung succeeding resumes automation.
        continue-on-error: true
        env:
          # Optional archive.org API keys (repo secrets): the wayback rung
          # uses authenticated Save Page Now when present — the reliable path
          # when anonymous SPN is quota-limited on shared runner IPs. Absent,
          # the rung still tries anonymous SPN + the newest fresh-enough
          # snapshot (age-guarded; stale data is refused loudly).
          ARCHIVE_SPN_ACCESS_KEY: ${{ secrets.ARCHIVE_SPN_ACCESS_KEY }}
          ARCHIVE_SPN_SECRET_KEY: ${{ secrets.ARCHIVE_SPN_SECRET_KEY }}
        run: python3 scripts/kendall_county_board_scraper.py /tmp/kendall_county_board_raw.json

      - name: Report blocked source on the standing issue
        if: steps.scrape.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Kendall County Board roster: automated refresh blocked by the county's edge"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          num=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' || true)
          if [ -z "$num" ]; then
            gh issue create --title "$title" --body "The weekly roster scrape failed on every engine (direct, headless Chromium, and Internet Archive Save Page Now — the county blocks the Archive's crawler too, SPN2 error:no-request). The shipped data/app/kendall-county-board-members.json keeps its last hand-verified state and stays correct until the county changes members. Manual step when this issue is old or an election/appointment happened: re-verify the members against the county's own directory and refresh the file via scripts/build_kendall_county_board_roster.py (see the scraper docstring). This issue is updated by each failed weekly run; close it if the block lifts and a run goes green. Latest failed run: $run_url"
          else
            gh issue comment "$num" --body "Still blocked as of $(date -u +%F) — $run_url"
          fi

      - name: Rebuild roster data file
        if: steps.scrape.outcome == 'success'
        run: python3 scripts/build_kendall_county_board_roster.py /tmp/kendall_county_board_raw.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        if: steps.scrape.outcome == 'success'
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        if: steps.scrape.outcome == 'success'
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.scrape.outcome == 'success' && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/kendall-county-board-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/kendall-county-board-members.json
          git commit -m "Update Kendall County Board roster from kendallcountyil.gov"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update Kendall County Board roster from kendallcountyil.gov" \
              --body "Automated weekly refresh of the consolidated county-board layer's Kendall member roster (names, districts, the Chairman role, phones, emails), generated by \`scripts/kendall_county_board_scraper.py\` + \`scripts/build_kendall_county_board_roster.py\` from kendallcountyil.gov. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
