name: Update CPD district commander/contact roster

# Weekly refresh of the Police District card's embedded commander/CAPS/
# station-address roster (see index.html's CPD_DISTRICT_INFO). Re-scrapes
# CPD's per-district pages and, if anything changed, opens a PR rather than
# committing directly to main — officeholder data should get a human look
# before it ships.

on:
  schedule:
    - cron: "0 13 * * 2" # Tuesday 13:00 UTC (staggered from the Monday ILGA job)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape CPD district commander/contact pages
        run: python3 scripts/cpd_district_scraper.py --out /tmp/cpd_district_info.json

      - name: Rebuild embedded roster in index.html
        run: python3 scripts/build_cpd_roster.py /tmp/cpd_district_info.json index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="bot/cpd-roster-update-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add index.html
          git commit -m "Update CPD district commander/contact roster"
          git push -u origin "$branch"
          gh pr create \
            --title "Update CPD district commander/contact roster" \
            --body "Automated weekly refresh of the Police District cards' embedded commander/CAPS/station-address roster, generated by \`scripts/cpd_district_scraper.py\` + \`scripts/build_cpd_roster.py\` from chicagopolice.org's per-district pages. Please review the diff before merging — this changes data about real officeholders." \
            --base main \
            --head "$branch"
