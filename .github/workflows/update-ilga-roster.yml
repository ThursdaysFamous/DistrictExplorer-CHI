name: Update IL Senate/House roster

# Weekly refresh of the IL Senate/House district cards' embedded roster
# (see index.html's IL_SENATE_MEMBERS / IL_HOUSE_MEMBERS). Re-scrapes
# ilga.gov and, if anything changed, opens a PR rather than committing
# directly to main — officeholder data should get a human look before
# it ships.

on:
  schedule:
    - cron: "0 13 * * 1" # Monday 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape ILGA member rosters
        run: python3 scripts/ilga_scraper.py --chamber both --out /tmp/ilga_network.json

      - name: Rebuild embedded roster in index.html
        run: python3 scripts/build_il_roster.py /tmp/ilga_network.json index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="bot/ilga-roster-update-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add index.html
          git commit -m "Update IL Senate/House roster from ilga.gov"
          git push -u origin "$branch"
          gh pr create \
            --title "Update IL Senate/House roster from ilga.gov" \
            --body "Automated weekly refresh of the IL Senate/House district cards' embedded roster, generated by \`scripts/ilga_scraper.py\` + \`scripts/build_il_roster.py\` from ilga.gov. Please review the diff before merging — this changes data about real officeholders." \
            --base main \
            --head "$branch"
