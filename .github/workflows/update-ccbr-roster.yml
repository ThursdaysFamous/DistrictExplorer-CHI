name: Update Board of Review commissioner roster

# Weekly refresh of the Cook County Board of Review card's elected-Commissioner
# roster (data/app/ccbr-roster.json, fetched by index.html). Re-scrapes the
# Board's own commissioner pages at cookcountyboardofreview.com and, if
# anything changed, opens a PR rather than committing directly to main —
# officeholder data should get a human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 5" # Friday 13:00 UTC (staggered from the Mon ILGA/congress, Tue CPD, Wed CCPSA, Thu Will County jobs)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        # Version-pinned via scripts/requirements.txt (constraints), but only the
        # two packages this job needs — cookcountyboardofreview.com is a plain
        # Drupal site with no JS challenge, so no Playwright (that's CPD-only).
        run: pip install -c scripts/requirements.txt requests beautifulsoup4

      - name: Scrape Board of Review commissioner pages
        run: python3 scripts/ccbr_scraper.py --out /tmp/ccbr_commissioners.json

      - name: Rebuild roster data file
        run: python3 scripts/build_ccbr_roster.py /tmp/ccbr_commissioners.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/ccbr-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/ccbr-roster.json
          git commit -m "Update Board of Review commissioner roster from cookcountyboardofreview.com"
          git push -u origin "$branch" --force
          # Only open a PR if one isn't already open for this branch; if it is,
          # the force-push above already updated it.
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update Board of Review commissioner roster from cookcountyboardofreview.com" \
              --body "Automated weekly refresh of the Cook County Board of Review card's elected-Commissioner roster, generated by \`scripts/ccbr_scraper.py\` + \`scripts/build_ccbr_roster.py\` from the Board's own commissioner pages. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
